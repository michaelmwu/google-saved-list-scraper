repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: ./scripts/lint.sh
        language: system
        pass_filenames: false
        types_or: [python, pyi]
      - id: mypy
        name: mypy
        entry: ./scripts/typecheck.sh
        language: system
        pass_filenames: false
        types_or: [python, pyi]
