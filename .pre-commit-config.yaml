repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: ./scripts/lint.sh
        language: system
        always_run: true
        pass_filenames: false
      - id: mypy
        name: mypy
        entry: ./scripts/typecheck.sh
        language: system
        always_run: true
        pass_filenames: false
