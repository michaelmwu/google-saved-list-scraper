name: "Convert TODOs to Issue"

on:
  pull_request_target:
    branches:
      - main
    types:
      - closed

concurrency:
  group: todo-to-issue-${{ github.event.pull_request.base.ref }}
  cancel-in-progress: false

jobs:
  build:
    if: github.event.pull_request.merged == true
    runs-on: "ubuntu-latest"
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd"
        with:
          fetch-depth: 0
          ref: main
          persist-credentials: false

      - name: "TODO to Issue"
        uses: "alstr/todo-to-issue-action@ef4bdc83227fa91c8e7525a122b0215f4b05039c"
        with:
          IDENTIFIERS: '[{"name": "BUG", "labels": []}, {"name": "FIXME", "labels": []}, {"name": "TODO", "labels": []}]'
          INSERT_ISSUE_URLS: "true"

      - name: Set Git user
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and Push Changes
        env:
          PUSH_TOKEN: ${{ secrets.GH_AUTOMATION_TOKEN != '' && secrets.GH_AUTOMATION_TOKEN || github.token }}
        run: |
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          git add -A
          has_stash=0
          if ! git diff --quiet || ! git diff --cached --quiet || [[ -n "$(git ls-files --others --exclude-standard)" ]]; then
            git stash push --include-untracked -m todo-to-issue-action
            has_stash=1
          fi

          git pull --rebase origin main

          if [[ "$has_stash" -eq 1 ]]; then
            git stash pop
          fi

          git add -A
          if [[ `git status --porcelain` ]]; then
            git commit -m "Automatically added GitHub issue links to TODOs"
            git push origin main
          else
            echo "No changes to commit"
          fi
